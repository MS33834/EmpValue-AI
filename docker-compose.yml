services:
  backend:
    build: ./backend
    container_name: empvalue-backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # 容器内持久化路径，覆盖默认的 ./empvalue_ai.db
      - DATABASE_URL=sqlite+aiosqlite:///./dbdata/empvalue_ai.db
      - VECTOR_STORE_DIR=/app/chroma_db
      # 安全默认值（生产环境请通过 .env 覆盖 JWT_SECRET_KEY）
      - AUTH_DEMO_MODE=false
      - DEBUG=false
    volumes:
      # 挂载 data 目录（profiles / sample 等可定制数据）
      - ./backend/data:/app/data
      # 持久化向量库
      - empvalue_chroma_data:/app/chroma_db
      # 持久化 SQLite 数据库
      - empvalue_db_data:/app/dbdata
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: empvalue-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: empvalue-redis
    volumes:
      - empvalue_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  empvalue_chroma_data:
  empvalue_db_data:
  empvalue_redis_data:
