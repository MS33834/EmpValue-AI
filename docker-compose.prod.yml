# EmpValue-AI 生产环境 Compose Override
#
# 用法:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# 配合基础 docker-compose.yml 叠加使用,补齐生产环境扩展:
#   - PostgreSQL 替代默认 SQLite
#   - MinIO 提供对象存储(替代/补充本地附件目录)
#   - NVIDIA GPU 加速本地模型推理
# 详见 docs/deployment-guide.md 第 3.6 节(与第四章"生产环境增强"呼应)。

services:
  backend:
    # 生产环境追加 PostgreSQL / MinIO 依赖(redis 依赖由基础 compose 提供,此处按 map 合并保留)
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # 切换为 PostgreSQL(覆盖基础 compose 中的 SQLite 连接串)
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-empvalue}:${POSTGRES_PASSWORD:-empvalue_pwd}@postgres:5432/${POSTGRES_DB:-empvalue}
      # 附件目录仍保留本地挂载(/app/attachments);MinIO 已就绪可作为对象存储后端,
      # 待后端集成 S3 兼容客户端后切换(规划见项目计划 Phase 6)。
      - ATTACHMENT_DIR=/app/attachments
    deploy:
      resources:
        reservations:
          devices:
            # NVIDIA GPU 加速本地模型推理。
            # 前置依赖:宿主机需先安装 NVIDIA Container Toolkit。
            # 安装文档: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
            # 若部署环境无 GPU,可注释掉以下设备块或移除整个 deploy 段。
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # PostgreSQL 生产数据库(替代 SQLite)
  postgres:
    image: postgres:15-alpine
    container_name: empvalue-postgres
    environment:
      # 生产环境务必通过 .env 或外部密钥管理服务覆盖以下默认凭据
      - POSTGRES_USER=${POSTGRES_USER:-empvalue}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-empvalue_pwd}
      - POSTGRES_DB=${POSTGRES_DB:-empvalue}
    volumes:
      - empvalue_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-empvalue} -d ${POSTGRES_DB:-empvalue}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # MinIO 对象存储(S3 兼容,用于原始附件:截图/语音/PDF)
  minio:
    image: minio/minio:latest
    container_name: empvalue-minio
    command: server /data --console-address ":9001"
    environment:
      # 生产环境务必通过 .env 或外部密钥管理服务覆盖以下默认凭据
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - empvalue_minio_data:/data
    ports:
      - "9000:9000"   # S3 API 端口
      - "9001:9001"   # Web Console 端口
    healthcheck:
      # MinIO 内置健康端点;官方 minio/minio:latest 镜像已内置 curl
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  empvalue_pg_data:
  empvalue_minio_data:
